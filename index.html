      --radius: 12px;
      --radius-lg: 16px;
      --transition: 0.2s ease;
    }

      color: var(--text);

    }

    .container {

      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--border);
    }

    .logo h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--primary), #f7c948);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .logo .tagline {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .theme-toggle {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 40px;
      padding: 6px 16px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text);
      transition: var(--transition);
    }

    .theme-toggle:hover {
      background: var(--card-hover);
      border-color: var(--primary);
    }

    /* ===== 搜索栏 ===== */
    .search-section {
      margin-bottom: 28px;
    }

    .engine-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .engine-tab {
      padding: 4px 16px;
      border-radius: 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-secondary);
    }

    .engine-tab.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }

    .engine-tab:hover:not(.active) {
      background: var(--card-hover);
    }

    .search-box {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 48px;
      padding: 4px 4px 4px 20px;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s;
    }

    .search-box:focus-within {
      box-shadow: var(--shadow);
      border-color: var(--primary);
    }

    .search-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.95rem;
      padding: 10px 0;
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-btn {
      background: var(--primary);
      border: none;
      border-radius: 40px;
      padding: 8px 24px;
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }

    .search-btn:hover {
      background: var(--primary-light);
      transform: scale(0.97);
    }

    /* ===== 置顶常用区 ===== */
    .pinned-section {
      margin-bottom: 32px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
      border-left: 4px solid var(--primary);
      padding-left: 12px;
    }

    .section-header h2 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .section-header .sub {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .pinned-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
    }

    .pinned-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 6px;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      transition: var(--transition);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

      background: var(--card-hover);
      transform: translateY(-3px);
      border-color: var(--primary);
      box-shadow: var(--shadow);
    }

    .pinned-icon {
      font-size: 1.8rem;

    .pinned-name {
      font-size: 0.8rem;

    }

    .sites-grid {

      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 10px;
    }

    .site-card {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 14px;
      text-decoration: none;
      color: var(--text);
      transition: var(--transition);
    }

    .site-card:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
      border-color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .site-icon {

      border-radius: 8px;
      flex-shrink: 0;

      min-width: 0;
    }

    .site-name {

      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;

      color: var(--primary);

      .pinned-grid { grid-template-columns: repeat(4, 1fr); }
      .header { flex-direction: column; align-items: stretch; gap: 8px; }
      .header-actions { justify-content: flex-end; }
      .search-box { padding: 4px 4px 4px 16px; }
      .search-btn { padding: 6px 16px; font-size: 0.8rem; }
    }
  </style>
</head>

      const cats = NAV_DATA.map(item => item.category);
      return [...new Set(cats)];
    }

    // 渲染分类 + 站点（固定显示全部，不过滤）
    function renderCategories() {
      const categories = getAllCategories();
      categoriesContainer.innerHTML = '';

      // 按分类分组
      const grouped = {};
      NAV_DATA.forEach(item => {
        if (!grouped[item.category]) grouped[item.category] = [];
        grouped[item.category].push(item);
      });

      // 按原始分类顺序渲染
      categories.forEach(cat => {
        const items = grouped[cat] || [];
        if (items.length === 0) return;

        const block = document.createElement('section');
        block.className = 'category-block';

        const header = document.createElement('div');
        header.className = 'section-header';
        header.innerHTML = `<h2>${cat}</h2><span class="sub">${items.length} 个工具</span>`;
        block.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'sites-grid';

        items.forEach(site => {
          const card = document.createElement('a');
          card.className = 'site-card';
          card.href = site.link;
          card.target = '_blank';
          card.rel = 'noopener';
          card.innerHTML = `
            <span class="site-icon">${site.icon || '🔗'}</span>
            <span class="site-info">
              <span class="site-name">${site.name}</span>
              <span class="site-desc">${site.desc}</span>
            </span>
          `;
          grid.appendChild(card);
        });

        block.appendChild(grid);
        categoriesContainer.appendChild(block);
      });
    }

    // ============================================================
    // 4. 搜索 & 引擎切换（只跳转，不过滤卡片）
    // ============================================================
    function bindSearchEvents() {
      // 引擎切换
      document.querySelectorAll('.engine-tab').forEach(tab => {
        tab.addEventListener('click', function() {
          document.querySelectorAll('.engine-tab').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          currentSearchUrl = this.dataset.url;
          const name = this.textContent.trim();
          searchInput.placeholder = `在 ${name} 中搜索 ...`;
        });
      });

      // 执行搜索：仅打开搜索引擎
      function doSearch() {
        const query = searchInput.value.trim();
        if (query === '') {
          searchInput.focus();
          return;
        }
        window.open(currentSearchUrl + encodeURIComponent(query), '_blank');
        searchInput.value = '';
        searchInput.focus();
      }

      searchBtn.addEventListener('click', doSearch);
      searchInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          doSearch();
        }
      });
    }

    // ============================================================
    // 5. 主题切换
    // ============================================================
    function initTheme() {
      const toggle = document.getElementById('themeToggle');
      const body = document.body;
      const saved = localStorage.getItem('toolbox-theme');

      if (saved === 'dark') {
        body.style.setProperty('--bg', '#0d1117');
        body.style.setProperty('--card-bg', '#161b22');
        body.style.setProperty('--card-hover', '#21262d');
        body.style.setProperty('--text', '#c9d1d9');
        body.style.setProperty('--text-secondary', '#8b949e');
        body.style.setProperty('--text-muted', '#6e7681');
        body.style.setProperty('--border', '#30363d');
        body.style.setProperty('--primary-soft', '#2a2418');
        toggle.textContent = '☀️ 亮色模式';
      } else {
        body.style.setProperty('--bg', '#f6f8fa');
        body.style.setProperty('--card-bg', '#ffffff');
        body.style.setProperty('--card-hover', '#f0f2f5');
        body.style.setProperty('--text', '#1f2328');
        body.style.setProperty('--text-secondary', '#57606a');
        body.style.setProperty('--text-muted', '#8c959f');
        body.style.setProperty('--border', '#d0d7de');
        body.style.setProperty('--primary-soft', '#fef3e2');
        toggle.textContent = '🌙 暗夜模式';
      }

      toggle.addEventListener('click', () => {
        const isDark = body.style.getPropertyValue('--bg') === '#0d1117';
        if (isDark) {
          body.style.setProperty('--bg', '#f6f8fa');
          body.style.setProperty('--card-bg', '#ffffff');
          body.style.setProperty('--card-hover', '#f0f2f5');
          body.style.setProperty('--text', '#1f2328');
          body.style.setProperty('--text-secondary', '#57606a');
          body.style.setProperty('--text-muted', '#8c959f');
          body.style.setProperty('--border', '#d0d7de');
          body.style.setProperty('--primary-soft', '#fef3e2');
          toggle.textContent = '🌙 暗夜模式';
          localStorage.setItem('toolbox-theme', 'light');
        } else {
          body.style.setProperty('--bg', '#0d1117');
          body.style.setProperty('--card-bg', '#161b22');
          body.style.setProperty('--card-hover', '#21262d');
          body.style.setProperty('--text', '#c9d1d9');
          body.style.setProperty('--text-secondary', '#8b949e');
          body.style.setProperty('--text-muted', '#6e7681');
          body.style.setProperty('--border', '#30363d');
          body.style.setProperty('--primary-soft', '#2a2418');
          toggle.textContent = '☀️ 亮色模式';
          localStorage.setItem('toolbox-theme', 'dark');
        }
      });
    }

    // ============================================================
    // 6. 初始化
    // ============================================================
    renderPinned();
    renderCategories();
    bindSearchEvents();
    initTheme();

    console.log(`🧰 7080网已启动 | 收录 ${NAV_DATA.length} 个站点`);
  })();
</script>
<script src="./js/tongji.js"></script>
</body>
</html>

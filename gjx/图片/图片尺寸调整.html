<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线图片尺寸调整工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }
        
        .container {
            background-color: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .upload-section {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background-color: #fafafa;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-section:hover {
            border-color: #4CAF50;
            background-color: #f0fff0;
        }
        
        .upload-section.dragover {
            border-color: #4CAF50;
            background-color: #e8f5e9;
        }
        
        .file-input {
            display: none;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .control-group {
            display: flex;
            flex-direction: column;
        }
        
        .control-label {
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        
        .dimension-input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        
        .aspect-ratio-toggle {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        
        .aspect-ratio-checkbox {
            margin-right: 8px;
            transform: scale(1.2);
        }
        
        .resize-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin: 20px 0;
            transition: background-color 0.3s ease;
        }
        
        .resize-btn:hover {
            background-color: #45a049;
        }
        
        .resize-btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .progress-bar {
            width: 100%;
            height: 20px;
            background-color: #f0f0f0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
            display: none;
        }
        
        .progress-fill {
            height: 100%;
            background-color: #4CAF50;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .status-text {
            text-align: center;
            margin: 10px 0;
            color: #666;
        }
        
        .preview-container {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 20px;
        }
        
        .preview-box {
            flex: 1;
            text-align: center;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        
        .image-info {
            font-size: 14px;
            color: #666;
        }
        
        .no-image {
            color: #999;
            font-style: italic;
        }
        
        .download-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin: 20px 0;
            transition: background-color 0.3s ease;
        }
        
        .download-btn:hover {
            background-color: #1976D2;
        }
        
        .reset-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #ff9800;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 0;
            transition: background-color 0.3s ease;
        }
        
        .reset-btn:hover {
            background-color: #f57c00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>在线图片尺寸调整工具</h1>
        
        <div class="upload-section" id="dropZone">
            <p>点击选择图片或拖拽图片到此处</p>
            <input type="file" id="fileInput" class="file-input" accept="image/*">
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label class="control-label">原始尺寸:</label>
                <span id="originalDimensions" class="image-info">未选择图片</span>
            </div>
            
            <div class="control-group">
                <label class="control-label">目标宽度 (像素):</label>
                <input type="number" id="targetWidth" class="dimension-input" min="1" value="" placeholder="输入宽度">
            </div>
            
            <div class="control-group">
                <label class="control-label">目标高度 (像素):</label>
                <input type="number" id="targetHeight" class="dimension-input" min="1" value="" placeholder="输入高度">
            </div>
            
            <div class="control-group">
                <div class="aspect-ratio-toggle">
                    <input type="checkbox" id="keepAspectRatio" class="aspect-ratio-checkbox" checked>
                    <label for="keepAspectRatio" class="control-label">保持纵横比</label>
                </div>
            </div>
        </div>
        
        <button id="resetBtn" class="reset-btn" style="display:none;">重置尺寸</button>
        <button id="resizeBtn" class="resize-btn" disabled>开始调整尺寸</button>
        
        <div class="progress-bar" id="progressBar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        
        <div class="status-text" id="statusText"></div>
        
        <div class="preview-container">
            <div class="preview-box">
                <h3>原始图片</h3>
                <img id="originalImage" class="preview-image no-image" src="" alt="原始图片预览">
                <div class="image-info" id="originalInfo">请选择图片</div>
            </div>
            
            <div class="preview-box">
                <h3>调整后图片</h3>
                <img id="resizedImage" class="preview-image no-image" src="" alt="调整后图片预览">
                <div class="image-info" id="resizedInfo">等待调整</div>
            </div>
        </div>
        
        <button id="downloadBtn" class="download-btn" style="display:none;">下载调整后图片</button>
    </div>

    <script>
        // 获取DOM元素
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const targetWidth = document.getElementById('targetWidth');
        const targetHeight = document.getElementById('targetHeight');
        const keepAspectRatio = document.getElementById('keepAspectRatio');
        const resetBtn = document.getElementById('resetBtn');
        const resizeBtn = document.getElementById('resizeBtn');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const originalImage = document.getElementById('originalImage');
        const resizedImage = document.getElementById('resizedImage');
        const originalInfo = document.getElementById('originalInfo');
        const resizedInfo = document.getElementById('resizedInfo');
        const originalDimensions = document.getElementById('originalDimensions');
        const downloadBtn = document.getElementById('downloadBtn');
        
        let selectedFile = null;
        let originalWidth = 0;
        let originalHeight = 0;
        let resizedBlob = null;
        
        // 文件上传事件监听
        dropZone.addEventListener('click', () => {
            fileInput.click();
        });
        
        fileInput.addEventListener('change', handleFileSelect);
        
        // 拖拽事件监听
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                if (file.type.startsWith('image/')) {
                    handleFile(file);
                } else {
                    alert('请选择图片文件！');
                }
            }
        });
        
        // 保持纵横比切换事件监听
        keepAspectRatio.addEventListener('change', updateTargetDimensions);
        
        // 目标尺寸输入事件监听
        targetWidth.addEventListener('input', function(e) {
            if (keepAspectRatio.checked) {
                updateTargetDimensions('width');
            }
        });
        
        targetHeight.addEventListener('input', function(e) {
            if (keepAspectRatio.checked) {
                updateTargetDimensions('height');
            }
        });
        
        // 重置按钮事件监听
        resetBtn.addEventListener('click', resetDimensions);
        
        // 调整尺寸按钮事件监听
        resizeBtn.addEventListener('click', resizeImage);
        
        // 下载按钮事件监听
        downloadBtn.addEventListener('click', downloadResizedImage);
        
        // 处理文件选择
        function handleFileSelect(e) {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        }
        
        // 处理文件
        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件！');
                return;
            }
            
            selectedFile = file;
            
            // 显示原始图片预览
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImage.src = e.target.result;
                originalImage.classList.remove('no-image');
                
                // 获取原始尺寸
                const img = new Image();
                img.onload = () => {
                    originalWidth = img.width;
                    originalHeight = img.height;
                    
                    // 更新原始尺寸显示
                    originalDimensions.textContent = `${originalWidth} x ${originalHeight} 像素`;
                    
                    // 初始化目标尺寸输入框
                    targetWidth.value = originalWidth;
                    targetHeight.value = originalHeight;
                    
                    // 计算并显示原始图片信息
                    const sizeInKB = Math.round(selectedFile.size / 1024);
                    originalInfo.textContent = `尺寸: ${img.width}x${img.height}, 大小: ${sizeInKB}KB`;
                    
                    // 启用按钮和重置按钮
                    resizeBtn.disabled = false;
                    resetBtn.style.display = 'block';
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }
        
        // 更新目标尺寸（保持纵横比）
        function updateTargetDimensions(changedDimension) {
            if (!originalWidth || !originalHeight) return;
            
            const aspectRatio = originalWidth / originalHeight;
            
            if (keepAspectRatio.checked) {
                if (changedDimension === 'width' && targetWidth.value) {
                    targetHeight.value = Math.round(parseInt(targetWidth.value) / aspectRatio);
                } else if (changedDimension === 'height' && targetHeight.value) {
                    targetWidth.value = Math.round(parseInt(targetHeight.value) * aspectRatio);
                }
            }
        }
        
        // 重置尺寸
        function resetDimensions() {
            if (originalWidth && originalHeight) {
                targetWidth.value = originalWidth;
                targetHeight.value = originalHeight;
            }
        }
        
        // 调整图片尺寸
        async function resizeImage() {
            if (!selectedFile) return;
            
            const newWidth = parseInt(targetWidth.value);
            const newHeight = parseInt(targetHeight.value);
            
            if (!newWidth || !newHeight || newWidth <= 0 || newHeight <= 0) {
                alert('请输入有效的尺寸！');
                return;
            }
            
            // 显示进度条和状态
            progressBar.style.display = 'block';
            statusText.textContent = '正在调整图片尺寸...';
            resizeBtn.disabled = true;
            
            try {
                // 更新进度
                progressFill.style.width = '30%';
                
                // 创建canvas来处理图片
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                // 设置canvas尺寸
                canvas.width = newWidth;
                canvas.height = newHeight;
                
                // 创建图片对象
                const img = new Image();
                img.onload = () => {
                    // 更新进度
                    progressFill.style.width = '60%';
                    statusText.textContent = '正在处理图片...';
                    
                    // 绘制图片到canvas（自动缩放）
                    ctx.drawImage(img, 0, 0, newWidth, newHeight);
                    
                    // 更新进度
                    progressFill.style.width = '90%';
                    statusText.textContent = '正在生成新图片...';
                    
                    // 将canvas转换为blob
                    canvas.toBlob((blob) => {
                        resizedBlob = blob;
                        
                        // 显示调整后图片预览
                        const resizedUrl = URL.createObjectURL(blob);
                        resizedImage.src = resizedUrl;
                        resizedImage.classList.remove('no-image');
                        
                        // 计算并显示调整后图片信息
                        const sizeInKB = Math.round(blob.size / 1024);
                        resizedInfo.textContent = `尺寸: ${newWidth}x${newHeight}, 大小: ${sizeInKB}KB`;
                        
                        // 显示下载按钮
                        downloadBtn.style.display = 'block';
                        
                        // 更新进度
                        progressFill.style.width = '100%';
                        statusText.textContent = '调整完成！';
                        
                        // 隐藏进度条
                        setTimeout(() => {
                            progressBar.style.display = 'none';
                            resizeBtn.disabled = false;
                        }, 1000);
                    }, 'image/jpeg', 0.9); // 使用高质量输出
                };
                
                img.src = URL.createObjectURL(selectedFile);
            } catch (error) {
                console.error('调整失败:', error);
                statusText.textContent = '调整失败，请重试！';
                progressBar.style.display = 'none';
                resizeBtn.disabled = false;
            }
        }
        
        // 下载调整后图片
        function downloadResizedImage() {
            if (!resizedBlob) return;
            
            const url = URL.createObjectURL(resizedBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `resized_${selectedFile.name}`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
	<script src="../../tongji.js"></script>
</body>
</html>

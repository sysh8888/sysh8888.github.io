<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel同名汇总合并工具</title>
    <!-- 引入 SheetJS 库用于处理 Excel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.mini.min.js"></script>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; background-color: #f5f7fa; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 12px 0 rgba(0,0,0,0.1); }
		        /* 示例表格样式 */
        .example-section { margin-bottom: 30px; padding: 20px; background-color: #fdf6ec; border: 1px solid #faecd8; border-radius: 6px; }
        .example-title { font-size: 16px; font-weight: bold; color: #e6a23c; margin-bottom: 15px; display: flex; align-items: center; }
        .example-title span { margin-right: 8px; font-size: 20px; }
        .example-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .example-box { flex: 1; min-width: 400px; }
        .example-box h4 { margin: 0 0 10px 0; color: #606266; font-size: 14px; }
        .example-table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; }
        .example-table th, .example-table td { border: 1px solid #dcdfe6; padding: 8px; text-align: left; }
        .example-table th { background-color: #f5f7fa; color: #909399; }
        .arrow-box { display: flex; align-items: center; justify-content: center; font-size: 30px; color: #e6a23c; }

		
        h2 { margin-top: 0; color: #333; }
        .step { margin-bottom: 20px; padding: 15px; border: 1px solid #ebeef5; border-radius: 4px; background-color: #fafafa; }
        .step h3 { margin-top: 0; font-size: 16px; color: #409eff; }
        select, button, input { padding: 8px 12px; margin-right: 10px; border: 1px solid #dcdfe6; border-radius: 4px; }
        button { background-color: #409eff; color: white; border: none; cursor: pointer; }
        button:hover { background-color: #66b1ff; }
        button:disabled { background-color: #a0cfff; cursor: not-allowed; }
        button.download { background-color: #67c23a; }
        button.download:hover { background-color: #85ce61; }
        table { width: 1000px; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { border: 1px solid #ebeef5; padding: 10px; text-align: left; }
        th { background-color: #f5f7fa; color: #606266; }
        .preview-box { overflow-x: auto; max-height: 400px; }
        .hint { color: #909399; font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
<div class="container">
    <h2>📊 Excel 同名汇总合并工具</h2>

 <!-- 新增：合并前后效果示例 -->
    <div class="example-section">
        <div class="example-title"><span></span> 合并效果示例说明</div>
        <div class="example-container">
            <!-- 合并前 -->
            <div class="example-box">
                <h4> 原表格（上传前）</h4>
                <table class="example-table">
                    <thead><tr><th>姓名</th><th>身份证</th><th>地址</th></tr></thead>
                    <tbody>
                        <tr><td>张三</td><td>1101011990...</td><td>北京市朝阳区</td></tr>
                        <tr><td>李四</td><td>3101011995...</td><td>上海市浦东新区</td></tr>
                        <tr><td>张三</td><td>1101012000...</td><td>北京市海淀区</td></tr>
                    </tbody>
                </table>
            </div>
            <!-- 箭头 -->
            <div class="arrow-box">️</div>
            <!-- 合并后 -->
            <div class="example-box">
                <h4> 合并后（下载结果）</h4>
                <table class="example-table">
                    <thead><tr><th>姓名</th><th>身份证</th><th>地址</th></tr></thead>
                    <tbody>
                        <tr><td>张三</td><td>1101011990、1101012000</td><td>北京市朝阳区、北京市海淀区</td></tr>
                        <tr><td>李四</td><td>3101011995</td><td>上海市浦东新区</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 步骤1：上传文件 -->
    <div class="step">
        <h3>1. 上传表格 (XLSX格式)</h3>
        <input type="file" id="fileInput" accept=".xlsx, .xls" />
        <div class="hint">请确保表格第一行为表头（如：姓名、身份证、地址）</div>
    </div>

    <!-- 步骤2：选择列 -->
    <div class="step" id="configStep" style="display: none;">
        <h3>2. 配置合并规则</h3>
        <label>汇总列（如姓名）：<select id="groupColumn"></select></label>
        <label>合并列（如身份证、地址，可多选）：<select id="mergeColumns" multiple size="3"></select></label>
        <div class="hint">按住 Ctrl 或 Command 键可多选需要合并的列</div>
    </div>

    <!-- 步骤3：执行合并 -->
    <div class="step" style="display: none;" id="actionStep">
        <h3>3. 执行操作</h3>
        <button id="mergeBtn">点击合并</button>
    </div>

    <!-- 步骤4：预览与下载 -->
    <div class="step" style="display: none;" id="resultStep">
        <h3>4. 预览前10行并下载</h3>
        <button class="download" id="downloadBtn">下载汇总好的表格</button>
        <div class="preview-box">
            <table id="previewTable"></table>
        </div>
    </div>
</div>

<script>
    let originalData = []; // 存储解析后的原始数据
    let mergedData = [];   // 存储合并后的数据

    const fileInput = document.getElementById('fileInput');
    const groupColumnSelect = document.getElementById('groupColumn');
    const mergeColumnsSelect = document.getElementById('mergeColumns');
    const mergeBtn = document.getElementById('mergeBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const previewTable = document.getElementById('previewTable');

    // 监听文件上传
    fileInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const firstSheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[firstSheetName];
            
            // 将Excel转换为JSON对象数组
            originalData = XLSX.utils.sheet_to_json(worksheet, { defval: "" }); // defval: "" 保证空单元格也有占位
            
            if (originalData.length === 0) {
                alert('表格为空或格式不正确！');
                return;
            }

            // 获取表头并填充下拉框
            const headers = Object.keys(originalData[0]);
            populateSelect(headers, groupColumnSelect);
            populateSelect(headers, mergeColumnsSelect);

            document.getElementById('configStep').style.display = 'block';
            document.getElementById('actionStep').style.display = 'block';
            document.getElementById('resultStep').style.display = 'none';
        };
        reader.readAsArrayBuffer(file);
    });

    // 填充下拉框选项
    function populateSelect(headers, selectElement) {
        selectElement.innerHTML = '';
        headers.forEach(header => {
            const option = document.createElement('option');
            option.value = header;
            option.textContent = header;
            selectElement.appendChild(option);
        });
    }

    // 点击合并按钮
    mergeBtn.addEventListener('click', function() {
        const groupKey = groupColumnSelect.value;
        const selectedMergeOptions = Array.from(mergeColumnsSelect.selectedOptions).map(opt => opt.value);

        if (!groupKey) {
            alert('请选择“汇总列”！');
            return;
        }
        if (selectedMergeOptions.length === 0) {
            alert('请至少选择一项“合并列”！');
            return;
        }

        // 核心合并逻辑
        const groupMap = new Map();

        originalData.forEach(row => {
            const key = row[groupKey]; // 获取汇总列的值（如姓名）
            if (!groupMap.has(key)) {
                // 如果该姓名第一次出现，初始化基础信息
                const newRow = { [groupKey]: key };
                selectedMergeOptions.forEach(col => {
                    newRow[col] = row[col] ? String(row[col]) : ""; // 初始化合并列
                });
                groupMap.set(key, newRow);
            } else {
                // 如果该姓名已存在，将其他列的数据拼接到后面
                const existingRow = groupMap.get(key);
                selectedMergeOptions.forEach(col => {
                    if (row[col]) {
                        existingRow[col] += "、" + row[col]; // 使用顿号拼接相同姓名的不同数据
                    }
                });
            }
        });

        // 将Map转换回数组
        mergedData = Array.from(groupMap.values());

        // 预览前10行
        renderPreview(mergedData.slice(0, 10));
        document.getElementById('resultStep').style.display = 'block';
    });

    // 渲染预览表格
    function renderPreview(data) {
        if (data.length === 0) {
            previewTable.innerHTML = '<tr><td>无数据</td></tr>';
            return;
        }
        const headers = Object.keys(data[0]);
        
        // 渲染表头
        let html = '<thead><tr>';
        headers.forEach(h => html += `<th>${h}</th>`);
        html += '</tr></thead>';

        // 渲染表体
        html += '<tbody>';
        data.forEach(row => {
            html += '<tr>';
            headers.forEach(h => html += `<td>${row[h]}</td>`);
            html += '</tr>';
        });
        html += '</tbody>';
        
        previewTable.innerHTML = html;
    }

    // 下载合并后的Excel
    downloadBtn.addEventListener('click', function() {
        if (mergedData.length === 0) return;
        
        const worksheet = XLSX.utils.json_to_sheet(mergedData);
        const workbook = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(workbook, worksheet, "汇总结果");
        XLSX.writeFile(workbook, "同名汇总合并结果.xlsx");
    });
</script>
	<script src="../../tongji.js"></script>
</body>
</html>
